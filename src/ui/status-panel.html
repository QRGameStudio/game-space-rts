<!-- Status panel -->
<div id="controls-c">
    <div r-if="v.selected.t === 'ship'">
        <b>ship</b>
    </div>
    <div r-if="v.selected.t === 'station'">
        <b>station</b>
    </div>
    <div r-if="v.selected.t === 'system'">
        <b>system</b>
    </div>


    <div r-if="v.selected.t === 'station'" class="buttons">
        <button class="btn btn-light">Fighter</button>
        <button class="btn btn-primary">Builder</button>
        <button class="btn btn-warning">Bomber</button>
        <button class="btn btn-danger">Self-destruct</button>
    </div>
</div>
