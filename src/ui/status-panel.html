<!-- Status panel -->
<div id="controls-c">
    <div r-if="v.selected.t === 'ship'">
        <b>ship</b>
    </div>
    <div r-if="v.selected.t === 'station'">
        <b>station</b>
    </div>
    <div r-if="v.selected.t === 'system'">
        <b>system</b>
    </div>

    <div r-if="v.selected.t === 'station'" class="buttons">
        <button class="btn btn-light" r-click="v.selected.build('fighter')">Fighter</button>
        <button class="btn btn-primary" r-click="v.selected.build('builder')">Builder</button>
        <button class="btn btn-warning" r-click="v.selected.build('bomber')">Bomber</button>
        <button class="btn btn-danger">Self-destruct</button>
    </div>
</div>
